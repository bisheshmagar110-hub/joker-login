<!DOCTYPE html><html>
<head>
<title>Joker Mod Login</title><style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(black, purple);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

h2 {
    color: purple;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid gray;
}

button {
    width: 100%;
    padding: 10px;
    background: purple;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

button:hover {
    background: black;
    color: white;
}
</style><script>
function login() {
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if (username == "joker" && password == "7days") {
        alert("Login Successful - Welcome to Joker Mod!");
    } else {
        alert("Wrong Username or Password!");
    }
}
</script></head><body><div class="login-box">
    <h2>Joker Mod Login</h2><input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div></body>
</html>
